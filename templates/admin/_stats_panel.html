<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 shadow-sm flex items-center">
        <div class="p-3 rounded-full bg-blue-900/50 text-blue-400 mr-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-400">Total Keys</p>
            <p class="text-2xl font-bold text-white">{{ stats.total_keys | default(0) }}</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 shadow-sm flex items-center">
        <div class="p-3 rounded-full bg-green-900/50 text-green-400 mr-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-400">Available Keys</p>
            <p class="text-2xl font-bold text-white">{{ stats.available_keys | default(0) }}</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 shadow-sm flex items-center">
        <div class="p-3 rounded-full bg-amber-900/50 text-amber-400 mr-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-400">Cooldown Keys</p>
            <p class="text-2xl font-bold text-white">{{ stats.cooldown_keys | default(0) }}</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 shadow-sm flex items-center">
        <div class="p-3 rounded-full bg-purple-900/50 text-purple-400 mr-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-400">Total Requests</p>
            <p class="text-2xl font-bold text-white">{{ stats.total_requests | default(0) }}</p>
        </div>
    </div>
</div>
