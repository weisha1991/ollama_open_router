<div class="space-y-4">
    <!-- Filters -->
    <div class="bg-gray-800 rounded-lg p-4 space-y-4">
        <!-- Log Level Filters -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">日志级别</label>
            <div class="flex flex-wrap gap-4">
                <label class="inline-flex items-center">
                    <input type="checkbox" value="DEBUG" class="stream-level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600">
                    <span class="ml-2 text-sm text-gray-300">DEBUG</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="INFO" class="stream-level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">INFO</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="WARNING" class="stream-level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">WARNING</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="ERROR" class="stream-level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">ERROR</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="CRITICAL" class="stream-level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">CRITICAL</span>
                </label>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="flex flex-wrap gap-2 items-center">
            <label class="inline-flex items-center">
                <input type="checkbox" id="auto-scroll" class="rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                <span class="ml-2 text-sm text-gray-300">自动滚动</span>
            </label>
            <button id="pause-btn" onclick="togglePause()" class="px-4 py-2 bg-yellow-600 hover:bg-yellow-700 text-white text-sm font-medium rounded-md transition-colors">
                暂停
            </button>
            <button onclick="clearLogs()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-md transition-colors">
                清空
            </button>
        </div>
    </div>

    <!-- Log Stream Container -->
    <div class="bg-gray-800 rounded-lg overflow-hidden">
        <div id="log-stream-container" class="h-96 overflow-y-auto font-mono text-sm p-4 space-y-1">
            <div class="text-gray-400 text-center py-8">
                点击"实时日志"标签开始查看实时日志...
            </div>
        </div>
    </div>
</div>

<script>
let eventSource = null;
let isPaused = false;
let maxLogs = 500;

function getStreamLevels() {
    const checkboxes = document.querySelectorAll('.stream-level-filter:checked');
    return Array.from(checkboxes).map(cb => cb.value).join(',');
}

function startLogStream() {
    if (eventSource) {
        eventSource.close();
    }

    const levels = getStreamLevels();
    const params = levels ? `?levels=${levels}` : '';
    eventSource = new EventSource(`/admin/api/logs/stream${params}`);

    const container = document.getElementById('log-stream-container');
    container.innerHTML = '<div class="text-gray-400 text-center py-8">等待日志...</div>';

    eventSource.addEventListener('log', function(e) {
        if (isPaused) return;
        try {
            const log = JSON.parse(e.data);
            addLogEntry(log);
        } catch (err) {
            console.error('Failed to parse log:', err);
        }
    });

    eventSource.addEventListener('ping', function(e) {
        // Heartbeat received, connection still alive
    });

    eventSource.addEventListener('error', function(e) {
        console.error('SSE error:', e);
        if (e.data) {
            try {
                const error = JSON.parse(e.data);
                addLogEntry({
                    timestamp: new Date().toISOString(),
                    level: 'ERROR',
                    request_id: 'system',
                    message: `Stream error: ${error.error}`
                });
            } catch (err) {}
        }
    });

    eventSource.onerror = function(e) {
        console.error('EventSource error:', e);
        if (eventSource.readyState === EventSource.CLOSED) {
            addLogEntry({
                timestamp: new Date().toISOString(),
                level: 'ERROR',
                request_id: 'system',
                message: 'Connection closed. Click "实时日志" to reconnect.'
            });
        }
    };
}

function stopLogStream() {
    if (eventSource) {
        eventSource.close();
        eventSource = null;
    }
}

function addLogEntry(log) {
    const container = document.getElementById('log-stream-container');

    // Remove placeholder if present
    const placeholder = container.querySelector('.text-center');
    if (placeholder && placeholder.textContent.includes('等待') || placeholder.textContent.includes('点击')) {
        placeholder.remove();
    }

    const entry = document.createElement('div');
    entry.className = 'flex gap-2';

    const levelColors = {
        'DEBUG': 'text-gray-400',
        'INFO': 'text-blue-400',
        'WARNING': 'text-yellow-400',
        'ERROR': 'text-red-400',
        'CRITICAL': 'text-red-500 font-bold'
    };

    const time = new Date(log.timestamp).toLocaleTimeString();
    entry.innerHTML = `
        <span class="text-gray-500 w-20 flex-shrink-0">${time}</span>
        <span class="${levelColors[log.level] || 'text-gray-300'} w-20 flex-shrink-0">${log.level}</span>
        <span class="text-gray-500 w-28 flex-shrink-0">[${log.request_id}]</span>
        <span class="text-gray-300 flex-1">${escapeHtml(log.message)}</span>
    `;

    container.appendChild(entry);

    // Limit log entries
    while (container.children.length > maxLogs) {
        container.removeChild(container.firstChild);
    }

    // Auto-scroll
    if (document.getElementById('auto-scroll').checked) {
        container.scrollTop = container.scrollHeight;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('pause-btn');
    btn.textContent = isPaused ? '继续' : '暂停';
    btn.className = isPaused
        ? 'px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-md transition-colors'
        : 'px-4 py-2 bg-yellow-600 hover:bg-yellow-700 text-white text-sm font-medium rounded-md transition-colors';
}

function clearLogs() {
    const container = document.getElementById('log-stream-container');
    container.innerHTML = `
        <div class="text-gray-400 text-center py-8">
            日志已清空
        </div>
    `;
}

// Update stream when level filters change
document.querySelectorAll('.stream-level-filter').forEach(cb => {
    cb.addEventListener('change', function() {
        if (document.getElementById('content-realtime').classList.contains('hidden') === false) {
            // Restart stream with new filters
            startLogStream();
        }
    });
});
</script>
