<div class="space-y-4">
    <!-- Filters -->
    <div class="bg-gray-800 rounded-lg p-4 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Time Range Preset -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">时间范围</label>
                <select id="time-preset" onchange="applyPreset()" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1h">最近1小时</option>
                    <option value="6h">最近6小时</option>
                    <option value="24h" selected>最近24小时</option>
                    <option value="7d">最近7天</option>
                    <option value="custom">自定义</option>
                </select>
            </div>
            <!-- Custom Start Time -->
            <div id="start-time-container" class="hidden">
                <label class="block text-sm font-medium text-gray-300 mb-2">开始时间</label>
                <input type="datetime-local" id="start-time" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <!-- Custom End Time -->
            <div id="end-time-container" class="hidden">
                <label class="block text-sm font-medium text-gray-300 mb-2">结束时间</label>
                <input type="datetime-local" id="end-time" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- Log Level Filters -->
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">日志级别</label>
            <div class="flex flex-wrap gap-4">
                <label class="inline-flex items-center">
                    <input type="checkbox" value="DEBUG" class="level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600">
                    <span class="ml-2 text-sm text-gray-300">DEBUG</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="INFO" class="level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">INFO</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="WARNING" class="level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">WARNING</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="ERROR" class="level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">ERROR</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="checkbox" value="CRITICAL" class="level-filter rounded text-blue-500 focus:ring-blue-500 bg-gray-700 border-gray-600" checked>
                    <span class="ml-2 text-sm text-gray-300">CRITICAL</span>
                </label>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-2">
            <button onclick="loadLogs()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-md transition-colors">
                查询
            </button>
            <button onclick="downloadLogs('log')" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white text-sm font-medium rounded-md transition-colors">
                下载 .log
            </button>
            <button onclick="downloadLogs('json')" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white text-sm font-medium rounded-md transition-colors">
                下载 .json
            </button>
        </div>
    </div>

    <!-- Logs Table -->
    <div class="bg-gray-800 rounded-lg overflow-hidden">
        <div id="logs-table-container">
            <div class="p-8 text-center text-gray-400">
                点击"查询"加载日志...
            </div>
        </div>
    </div>
</div>

<script>
function applyPreset() {
    const preset = document.getElementById('time-preset').value;
    const startContainer = document.getElementById('start-time-container');
    const endContainer = document.getElementById('end-time-container');

    if (preset === 'custom') {
        startContainer.classList.remove('hidden');
        endContainer.classList.remove('hidden');
    } else {
        startContainer.classList.add('hidden');
        endContainer.classList.add('hidden');
    }
}

function getTimeRange() {
    const preset = document.getElementById('time-preset').value;
    const now = new Date();
    let start, end;

    if (preset === 'custom') {
        start = document.getElementById('start-time').value;
        end = document.getElementById('end-time').value;
        if (start) start = new Date(start).toISOString();
        if (end) end = new Date(end).toISOString();
    } else {
        end = now.toISOString();
        const hours = preset === '1h' ? 1 : preset === '6h' ? 6 : preset === '24h' ? 24 : 168;
        start = new Date(now - hours * 3600000).toISOString();
    }
    return { start, end };
}

function getSelectedLevels() {
    const checkboxes = document.querySelectorAll('.level-filter:checked');
    return Array.from(checkboxes).map(cb => cb.value).join(',');
}

function loadLogs() {
    const { start, end } = getTimeRange();
    const levels = getSelectedLevels();
    const params = new URLSearchParams();
    if (start) params.append('start', start);
    if (end) params.append('end', end);
    if (levels) params.append('levels', levels);

    const container = document.getElementById('logs-table-container');
    container.innerHTML = '<div class="p-8 text-center text-gray-400">加载中...</div>';

    fetch(`/admin/api/logs?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            renderLogsTable(data);
        })
        .catch(err => {
            container.innerHTML = '<div class="p-8 text-center text-red-400">加载失败: ' + escapeHtml(err.message) + '</div>';
        });
}

function renderLogsTable(data) {
    const container = document.getElementById('logs-table-container');

    if (!data.items || data.items.length === 0) {
        container.innerHTML = '<div class="p-8 text-center text-gray-400">没有找到匹配的日志记录</div>';
        return;
    }

    let html = `
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-700">
                <thead class="bg-gray-700">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">时间</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">级别</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">请求ID</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">消息</th>
                    </tr>
                </thead>
                <tbody class="bg-gray-800 divide-y divide-gray-700">
    `;

    data.items.forEach(item => {
        const levelClass = {
            'DEBUG': 'bg-gray-600 text-gray-300',
            'INFO': 'bg-blue-600 text-white',
            'WARNING': 'bg-yellow-600 text-white',
            'ERROR': 'bg-red-600 text-white',
            'CRITICAL': 'bg-red-700 text-white font-bold'
        }[item.level] || 'bg-gray-600 text-gray-300';

        const time = item.timestamp.substring(0, 19);
        html += `
            <tr class="hover:bg-gray-700">
                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-300">${time}</td>
                <td class="px-4 py-3 whitespace-nowrap text-sm">
                    <span class="px-2 py-1 text-xs rounded ${levelClass}">${item.level}</span>
                </td>
                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-400 font-mono">${item.request_id}</td>
                <td class="px-4 py-3 text-sm text-gray-300">${escapeHtml(item.message)}</td>
            </tr>
        `;
    });

    html += `
                </tbody>
            </table>
        </div>
        <div class="px-4 py-3 bg-gray-700 text-sm text-gray-300">
            显示 ${data.filtered} 条记录，共 ${data.total} 条
            ${data.has_more ? '<span class="text-gray-400">(还有更多记录)</span>' : ''}
        </div>
    `;

    container.innerHTML = html;
}

function downloadLogs(format) {
    const { start, end } = getTimeRange();
    const levels = getSelectedLevels();
    const params = new URLSearchParams();
    if (start) params.append('start', start);
    if (end) params.append('end', end);
    if (levels) params.append('levels', levels);
    params.append('format', format);

    window.location.href = `/admin/api/logs/download?${params.toString()}`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
