version: "3.8"

services:
  ollama-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-router
    restart: unless-stopped
    ports:
      - "11435:11435"
    volumes:
      - ./logs:/app/logs
      - ./state:/app/state
      - ./config.docker.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - OLLAMA_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OLLAMA_LOG_FILE=${LOG_FILE:-logs/ollama_router.log}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
